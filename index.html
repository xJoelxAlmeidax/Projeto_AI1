<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PcChip9</title>
    <link rel="stylesheet"  href="styleIndex.css">
</head>
<body>

    <!-- Barra lateral oculta -->
    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="closeSidebar()">&times;</span>
        <a href="#">Home</a>
        <a href="#">Campanhas e Ofertas</a>
        <a href="#">Configurador</a>
        <a href="#">Produtos</a>
        <a href="#">PC Gaming</a>
        <a href="#">Lojas Perto de Si</a>
    </div>

    <!-- Conteúdo principal -->
    <div class="main-content">
        <h1>Bem-vindo!</h1>
        <p>Este é um exemplo de uma barra lateral oculta que aparece ao clicar no botão "Menu".</p>
    </div>

    <script>
        /* Função para abrir a barra lateral */
        function openSidebar() {
            document.getElementById("sidebar").style.width = "250px";
        }

        /* Função para fechar a barra lateral */
        function closeSidebar() {
            document.getElementById("sidebar").style.width = "0";
        }
    </script>



    <div class="navbar">
        <div class="logo">
            PcChip9
        </div>

        <div class="search-container">
            <input type="text" placeholder="Escreve aqui o que procuras...">
        </div>
        
        <!-- Botão para abrir a barra lateral -->
        <button class="open-btn" onclick="openSidebar()">☰ Menu</button>

    </div>

    
    <footer>

    </footer>
</body>
</html>
